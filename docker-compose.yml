version: '3.8'

services:
  market-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-scraper
    restart: unless-stopped
    ports:
      - "3845:3845"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    env_file:
      - .env
    networks:
      - hybrid-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3845/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  hybrid-network:
    external: true
