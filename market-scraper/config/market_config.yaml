# Market Scraper Configuration
# Controls trader scoring, filtering, buffering, and data retention

# Scoring Algorithm Weights (should sum to 100 for proper weighting)
scoring:
  weights:
    all_time_roi: 30      # 30% weight on all-time ROI
    month_roi: 25         # 25% weight on month ROI
    week_roi: 20          # 20% weight on week ROI
    account_value: 15     # 15% weight on account value
    volume: 10            # 10% weight on trading volume

  # Bonus points
  consistency_bonus: 5    # +5 points if all timeframes positive

  # ROI multipliers (how much to multiply ROI by for score)
  roi_multipliers:
    all_time: 30          # max 30 points
    month: 50             # max 25 points
    week: 100             # max 20 points (can be -10)

# Account Value Scoring Tiers
account_value_tiers:
  - threshold: 10000000   # $10M+
    points: 15
  - threshold: 5000000    # $5M+
    points: 12
  - threshold: 1000000    # $1M+
    points: 8
  - threshold: 100000     # $100K+
    points: 4
  - threshold: 0
    points: 0

# Volume Scoring Tiers (monthly volume)
volume_tiers:
  - threshold: 100000000  # $100M+
    points: 10
  - threshold: 50000000   # $50M+
    points: 7
  - threshold: 10000000   # $10M+
    points: 4
  - threshold: 1000000    # $1M+
    points: 2
  - threshold: 0
    points: 0

# Filter Criteria - Traders must match ALL filters
# When tiered_enabled is true, the multi-tier filter replaces the single-score
# approach, allocating max_count slots across different trader pools.
filters:
  min_score: 50              # Fallback when tiered_enabled=false
  max_count: 200             # Total active tracked universe size
  min_account_value: 10000   # Minimum account value ($10K)
  tiered_enabled: true       # Use multi-tier filtering

  # Multi-tier definitions (evaluated in order)
  # Each tier fills independently from the scored universe.
  # A trader assigned to one tier is removed from subsequent tiers.
  tiers:
    - name: whale
      max_slots: 50
      min_account_value: 1000000      # $1M+
      require_positive: ["month"]     # Must be green this month
    - name: alpha
      max_slots: 50
      min_account_value: 100000       # $100K+
      min_roi_month: 0.05             # 5%+ month ROI
      min_roi_all_time: 0.20          # 20%+ all-time
      require_positive: ["week", "month"]
    - name: grinder
      max_slots: 50
      min_account_value: 10000        # $10K+
      min_roi_month: 0.10             # 10%+ month ROI
      min_roi_all_time: 0.50          # 50%+ all-time
      require_positive: ["week", "month"]
    - name: momentum
      max_slots: 50
      min_account_value: 10000        # $10K+
      min_roi_day: 0.01               # 1%+ day ROI (hot this week)
      min_roi_week: 0.03              # 3%+ week ROI
      require_positive: ["day", "week"]

  # Optional: Require specific performance
  require_positive:
    all_time: false          # Require positive all-time ROI
    month: false             # Require positive month ROI
    week: false              # Require positive week ROI

  # Numeric ROI thresholds (overrides require_positive when set)
  min_roi_all_time: null     # Min all-time ROI (e.g. 0.5 = 50%) — null = no filter
  max_roi_all_time: null     # Max all-time ROI
  min_roi_month: null        # Min month ROI
  max_roi_month: null        # Max month ROI
  min_roi_week: null         # Min week ROI
  max_roi_week: null         # Max week ROI
  min_roi_day: null          # Min day ROI
  max_roi_day: null          # Max day ROI

  # Numeric volume thresholds
  min_volume_month: null     # Min monthly volume
  max_volume_month: null     # Max monthly volume

  # Numeric PnL thresholds
  min_pnl_all_time: null     # Min all-time PnL
  max_pnl_all_time: null     # Max all-time PnL

  # Optional: Always include specific addresses in the tracked universe
  include:
    addresses: []            # List of addresses to force-include

  # Optional: Exclude traders
  exclude:
    addresses: []            # List of addresses to exclude
    tags: []                 # List of tags to exclude

# Tag Configuration
tags:
  whale:
    threshold: 10000000      # Account value >= $10M
  large:
    threshold: 1000000       # Account value >= $1M
  top_performer:
    min_score: 80            # Score >= 80
  elite:
    min_score: 90            # Score >= 90
  consistent:
    require_positive:
      - day
      - week
      - month                # All timeframes positive
  high_performer:
    all_time_roi: 1.0        # 100%+ all-time ROI
  high_volume:
    monthly_volume: 100000000  # $100M+ monthly volume
  medium_volume:
    monthly_volume: 10000000   # $10M+ monthly volume

# Tracking Cadence - Traders are grouped into cadence tiers with different update
# frequencies to avoid wasting API calls on inactive or low-signal traders.
tracking_cadence:
  enabled: true
  check_interval_base: 60           # Base check interval (seconds)
  tiers:
    gold:
      max_traders: 20
      check_interval_seconds: 30     # Every 30s — real-time position tracking
      min_acct_val: 1000000          # $1M minimum
      min_month_roi: 0.05             # 5% monthly ROI
      min_score: 70
    silver:
      max_traders: 50
      check_interval_seconds: 120    # Every 2min — position updates, PnL alerts
      min_acct_val: 100000           # $100K minimum
      min_month_roi: 0.03            # 3% monthly ROI
      min_score: 50
    watchlist:
      max_traders: 100
      check_interval_seconds: 300    # Every 5min — score changes only
      min_acct_val: 10000            # $10K minimum
      min_month_roi: 0.0             # Any positive ROI
      min_score: 30

# Promoter - Evaluates tracked traders each cycle for promotion/demotion
promoter:
  enabled: true
  stale_cycles: 10                   # Drop traders after N cycles without improvement
  min_demote_score: 20               # Traders below this score are evicted
  promotion_warmup_cycles: 3         # New traders must survive N cycles before Gold
  max_evictions_per_cycle: 10

# Position Inference Configuration
position_inference:
  enabled: true
  confidence_threshold: 0.5  # Minimum confidence to consider

  # Indicators of active position
  indicators:
    day_roi_threshold: 0.0001      # 0.01% day ROI indicates position
    pnl_ratio_threshold: 0.001     # 0.1% PnL/account ratio
    day_volume_threshold: 100000   # $100K daily volume

# Storage Configuration
storage:
  # How often to refresh tracked traders (seconds)
  refresh_interval: 3600  # 1 hour

  # Keep history of leaderboard snapshots
  keep_snapshots: true

  # Keep score history for trend analysis
  keep_score_history: false

  # Cache the full raw 39K trader leaderboard snapshot each cycle
  keep_raw_leaderboard: true

  # Per-collection retention (days) - automatic deletion via MongoDB TTL indexes
  retention:
    events: 2                  # Raw audit events only (canonical data lives elsewhere)
    leaderboard_history: 90    # Leaderboard snapshots
    leaderboard_raw: 7         # Raw 39K trader snapshots (large dataset, shorter retention)
    trader_positions: 30       # Position snapshots
    trader_scores: 90          # Score history
    signals: 30                # Trading signals
    trader_signals: 30         # Per-trader signals
    mark_prices: 30            # Mark price data
    trades: 7                  # Raw trade data
    orderbook: 7               # Orderbook snapshots
    candles: 30                # OHLCV candles

# Buffer and Flush Configuration
# Controls how events are batched before being saved to MongoDB
buffer:
  flush_interval: 120.0

  max_size: 500

  broadcast_batch_size: 100

  broadcast_batch_timeout_ms: 10.0

# Trader WS Tracking Strategy
trader_ws:
  max_clients: 5
  subscriptions_per_client: 10
  rotation_interval_seconds: 900
  serial_mode: true
  client_dwell_seconds: 60

# Candle Backfill Configuration
candle_backfill:
  enabled: true
  start_date: null
  timeframes:
    - "1h"
    - "4h"
    - "1d"
  batch_size: 500
  rate_limit_delay: 0.5
  run_on_startup: false
  incremental: true

# Scheduler Configuration
scheduler:
  enabled: false

  tasks:
    leaderboard_refresh:
      enabled: true
      interval_seconds: 3600

    health_check:
      enabled: true
      interval_seconds: 600

    data_cleanup:
      enabled: false
      interval_seconds: 86400

    connector_health:
      enabled: true
      interval_seconds: 600

    memory_guardian:
      enabled: true
      interval_seconds: 300

    trader_ws_rotation:
      enabled: true
      interval_seconds: 900

    archival:
      enabled: false
      interval_seconds: 2592000

# Data Archival Configuration
archival:
  enabled: false
  schedule: "monthly"
  compression:
    algorithm: "zstd"
    level: 3
  git_lfs:
    repo_url: "${ARCHIVE_REPO_URL}"
    branch: "main"
    local_cache: "/data/archives/repo"
  local_cache: "/data/archives"
  collections:
    - trader_positions
    - signals
    - leaderboard_history
    - candles
  archive_before_ttl_days: 2